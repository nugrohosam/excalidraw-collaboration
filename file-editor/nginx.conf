server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /editor {
        return 301 /editor/;
    }

    location /editor/ {
        rewrite ^/editor/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
