services:
  app:
    env_file:
      - .env
    image: alswl/excalidraw:v0.18.1-fork-b2
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - VITE_APP_BACKEND_V2_GET_URL=https://${STORAGE_BACKEND_HOST}/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=https://${STORAGE_BACKEND_HOST}/api/v2/scenes/
      - VITE_APP_WS_SERVER_URL=https://${ROOM_HOST}/
      - VITE_APP_FIREBASE_CONFIG={}
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://${STORAGE_BACKEND_HOST}/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_DISABLE_TRACKING=true
      - PUBLIC_URL=https://${APP_HOST}
    ports:
    - "9013:80"

  storage:
    env_file:
        - .env
    image: alswl/excalidraw-storage-backend:v2023.11.11
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - STORAGE_URI=mongodb://${DB_USER}:${DB_PASS}@mongodb:27017
    ports:
      - "9014:8080"

  room:
    env_file:
        - .env
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "9015:80"

  file-editor:
    env_file:
      - .env
    build:
      context: ../file-editor
    restart: unless-stopped
    ports:
      - "9017:80"

  file-gateway:
    env_file:
        - .env
    build:
      context: ../file-gateway
    restart: unless-stopped
    environment:
      - PORT=8090
      - APP_PUBLIC_URL=https://${APP_HOST}
      - EDITOR_OPEN_PATH=${EDITOR_OPEN_PATH:-/editor/}
      - GATEWAY_PUBLIC_URL=https://${APP_HOST}
      - HOST_API_KEY=${HOST_API_KEY}
      - TOKEN_SECRET=${TOKEN_SECRET}
      - TOKEN_TTL_SECONDS=${TOKEN_TTL_SECONDS}
      - STORAGE_ADAPTER=${STORAGE_ADAPTER}
      - FILESYSTEM_STORAGE_PATH=/data/files
      - HOST_STORAGE_BASE_URL=${HOST_STORAGE_BASE_URL}
      - HOST_STORAGE_API_KEY=${HOST_STORAGE_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - MAX_BODY_BYTES=${MAX_BODY_BYTES}
      - LOCK_TTL_SECONDS=${LOCK_TTL_SECONDS}
    volumes:
      - ${FILE_STORAGE_PATH}:/data/files
    ports:
      - "9016:8090"

  mongodb:
    env_file:
      - .env
    image: mongo:7.0.5-jammy
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASS}
    volumes:
      - ${DB_VOLUME_PATH}:/data/db
    user: "1000"
